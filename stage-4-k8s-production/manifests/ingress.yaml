# Replaces: --publish 8080:80 / --publish 5000:5000
#
# Ingress is an HTTP router that sits in front of your services.
# It terminates TLS, routes by host/path, and is handled by an Ingress Controller
# (nginx-ingress, Traefik, AWS ALB controller, etc.)
#
# Install nginx ingress controller locally:
#   kind:      kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/kind/deploy.yaml
#   minikube:  minikube addons enable ingress
#
# Add to /etc/hosts for local testing:
#   127.0.0.1  shipit.local
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shipit
  namespace: shipit
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # Automatic TLS via cert-manager (comment out if not installed)
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  # tls:                               # uncomment for HTTPS
  #   - hosts:
  #       - shipit.local
  #     secretName: shipit-tls
  rules:
    - host: shipit.local
      http:
        paths:
          # All traffic goes to the frontend; Nginx inside the frontend container
          # proxies requests matching /api/ upstream to the api Service.
          # This is the correct routing pattern for this app — do NOT add a
          # separate /api path here, because the Ingress would then intercept
          # those requests before Nginx can proxy them, breaking the app.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
