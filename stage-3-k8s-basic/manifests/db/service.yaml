# Replaces: --network shipit-net (the DNS name was the container name)
#
# In compose, services find each other by service name (e.g. "db").
# In Kubernetes, Services provide stable DNS + load-balanced ClusterIP.
#
# DNS pattern: <service-name>.<namespace>.svc.cluster.local
# Short form (same namespace): db
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: shipit
spec:
  selector:
    app: db              # routes to pods labelled app=db
  ports:
    - port: 5432
      targetPort: 5432
  # type: ClusterIP is the default — internal only, not reachable from outside the cluster
