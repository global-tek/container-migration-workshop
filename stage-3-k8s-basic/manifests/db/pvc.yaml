# Replaces: docker volume create shipit-pgdata
# The "volumes:" block in docker-compose.yaml
#
# A PersistentVolumeClaim asks the cluster for durable storage.
# The cluster binds it to a PersistentVolume (cloud disk, NFS, local path…).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: shipit
spec:
  accessModes:
    - ReadWriteOnce       # one node can mount read/write at a time (sufficient for a single Postgres pod)
  resources:
    requests:
      storage: 1Gi
  # storageClassName: standard   # uncomment and set for your cluster's storage class
