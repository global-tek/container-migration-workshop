# Replaces: docker run postgres:16-alpine + --volume + --env + --restart
#
# NOTE: For a production database prefer a StatefulSet (stable network
#       identity, ordered rollout). A Deployment is fine for this workshop.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  namespace: shipit
  labels:
    app: db
spec:
  replicas: 1           # single Postgres pod; scale via read replicas not replica count
  selector:
    matchLabels:
      app: db
  template:
    metadata:
      labels:
        app: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "todos"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 5
            periodSeconds: 5
          # livenessProbe uses a longer delay and higher failure threshold than
          # readinessProbe — we want to restart only if Postgres is truly stuck
          # (e.g. deadlock), not merely slow to accept connections during startup.
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "postgres"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: pgdata
          persistentVolumeClaim:
            claimName: postgres-data
