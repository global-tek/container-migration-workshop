# Replaces: --publish 5000:5000
#
# NodePort exposes the service on every node's IP at a static port (30000-32767).
# It's the simplest way to reach the service from outside the cluster without an
# Ingress controller.  In production you'd use ClusterIP + Ingress instead.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shipit
spec:
  selector:
    app: api
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500      # access via http://<node-ip>:30500
  type: NodePort
