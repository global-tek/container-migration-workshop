<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShipIt Todos</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
    h1 { font-size: 2rem; font-weight: 700; color: #7c3aed; margin-bottom: 0.25rem; letter-spacing: -0.5px; }
    .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
    .card { background: #1e2130; border: 1px solid #2d3148; border-radius: 12px; width: 100%; max-width: 540px; padding: 1.5rem; }
    .add-form { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; }
    input[type=text] { flex: 1; padding: 0.65rem 1rem; background: #12131f; border: 1px solid #2d3148; border-radius: 8px; color: #e2e8f0; font-size: 0.95rem; outline: none; }
    input[type=text]:focus { border-color: #7c3aed; }
    button.add-btn { padding: 0.65rem 1.25rem; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem; }
    button.add-btn:hover { background: #6d28d9; }
    ul { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
    li { display: flex; align-items: center; gap: 0.75rem; padding: 0.75rem 1rem; background: #12131f; border-radius: 8px; border: 1px solid #2d3148; }
    li.done .title { text-decoration: line-through; color: #475569; }
    .title { flex: 1; font-size: 0.95rem; }
    input[type=checkbox] { accent-color: #7c3aed; width: 16px; height: 16px; cursor: pointer; }
    .del-btn { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; padding: 0 4px; }
    .del-btn:hover { color: #ef4444; }
    .empty { text-align: center; color: #475569; padding: 2rem 0; font-size: 0.9rem; }
    .env-badge { font-size: 0.7rem; color: #475569; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>🚢 ShipIt Todos</h1>
  <p class="subtitle">A multi-tier app for the container migration workshop</p>

  <div class="card">
    <div class="add-form">
      <input type="text" id="new-todo" placeholder="Add a new task…" />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>
    <ul id="todo-list"></ul>
    <div class="empty" id="empty-msg" style="display:none">No tasks yet. Add one above!</div>
  </div>

  <p class="env-badge" id="env-info"></p>

  <script>
    // Prefer same-origin proxy path so browser does not depend on host-local :5000.
    // Nginx routes /api/* to the backend container using BACKEND_HOST.
    const API_URL = window.API_URL || "/api";

    async function fetchTodos() {
      const res = await fetch(`${API_URL}/todos`);
      const todos = await res.json();
      render(todos);
    }

    async function addTodo() {
      const input = document.getElementById("new-todo");
      const title = input.value.trim();
      if (!title) return;
      await fetch(`${API_URL}/todos`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      input.value = "";
      fetchTodos();
    }

    async function toggleTodo(id, done) {
      await fetch(`${API_URL}/todos/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ done }),
      });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API_URL}/todos/${id}`, { method: "DELETE" });
      fetchTodos();
    }

    function render(todos) {
      const list = document.getElementById("todo-list");
      const empty = document.getElementById("empty-msg");
      list.innerHTML = "";
      empty.style.display = todos.length === 0 ? "block" : "none";
      todos.forEach(t => {
        const li = document.createElement("li");
        if (t.done) li.classList.add("done");
        li.innerHTML = `
          <input type="checkbox" ${t.done ? "checked" : ""} onchange="toggleTodo(${t.id}, this.checked)" />
          <span class="title">${escHtml(t.title)}</span>
          <button class="del-btn" onclick="deleteTodo(${t.id})">✕</button>`;
        list.appendChild(li);
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    document.getElementById("new-todo").addEventListener("keydown", e => {
      if (e.key === "Enter") addTodo();
    });

    document.getElementById("env-info").textContent = `API → ${API_URL}`;

    fetchTodos();
  </script>
</body>
</html>
