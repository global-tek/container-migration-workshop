# Non-secret frontend configuration.
# Safe to commit — no credentials here.
#
# BACKEND_HOST is the Kubernetes Service name for the API.
# Nginx (inside the frontend container) substitutes ${BACKEND_HOST} at startup
# via the nginx official image's envsubst template mechanism.
# Within the same namespace, the short name "api" resolves via kube-dns to
# the api Service ClusterIP (equivalent to api.shipit.svc.cluster.local).
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: shipit
data:
  BACKEND_HOST: "api"
