# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  WORKSHOP ONLY — DO NOT COMMIT TO A REAL REPO                          ║
# ╚══════════════════════════════════════════════════════════════════════════╝
#
# base64 is ENCODING, not ENCRYPTION.  Anyone with kubectl access (or who
# reads this file) can decode the values instantly:
#
#   echo 'c3VwZXJzZWNyZXQ=' | base64 -d   # prints: supersecret
#
# For a real cluster, never store credentials as plain Secrets in YAML.
# Choose one of these production-grade alternatives instead:
#
#   Sealed Secrets (Bitnami)  — GitOps-friendly; encrypts with the cluster key
#   External Secrets Operator — syncs from AWS SSM / GCP Secret Manager / Vault
#   CSI Secrets Store Driver  — mounts secrets as files, never stored in etcd
#
# Quick example with Sealed Secrets:
#   kubectl create secret generic db-credentials \
#     --from-literal=username=postgres \
#     --from-literal=password=<real-password> \
#     --dry-run=client -o yaml \
#     | kubeseal --format yaml > sealed-db-credentials.yaml
#   # sealed-db-credentials.yaml is safe to commit; the raw Secret is not.
#
# To encode a new value:  echo -n 'myvalue' | base64
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: shipit
type: Opaque
data:
  #        base64("postgres")     base64("supersecret")
  username: cG9zdGdyZXM=
  password: c3VwZXJzZWNyZXQ=
